<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Rubik+Bubbles&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        /* Floating hearts background */
        .bg-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.15;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .ring-emoji {
            font-size: 4rem;
            animation: bounce 1s ease infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-family: 'Rubik Bubbles', cursive;
            font-size: 2.5rem;
            margin: 1rem 0;
            background: linear-gradient(90deg, #ff6b9d, #ffa69e, #ffd9da, #ffa69e, #ff6b9d);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .hearts {
            font-size: 1.5rem;
            margin: 0.8rem 0 1.5rem;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .form-box {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 0.5rem;
        }

        .password-input {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1.2rem;
            font-family: 'Heebo', sans-serif;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 107, 157, 0.3);
            border-radius: 14px;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            direction: ltr;
        }

        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .password-input:focus {
            border-color: #ff6b9d;
            background: rgba(255, 107, 157, 0.1);
            box-shadow: 0 0 25px rgba(255, 107, 157, 0.2);
        }

        .decrypt-btn {
            width: 100%;
            margin-top: 1.2rem;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
        }

        .decrypt-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
        }

        .decrypt-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .remember-me {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .remember-me input[type="checkbox"] {
            accent-color: #ff6b9d;
            width: 16px;
            height: 16px;
        }

        .hint {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: rgba(255, 166, 158, 0.6);
            font-weight: 300;
        }

        .error-msg {
            display: none;
            margin-top: 0.8rem;
            color: #e74c3c;
            font-size: 0.95rem;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Sparkle on click */
        .sparkle-burst {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }

        .sparkle-particle {
            position: absolute;
            border-radius: 50%;
            animation: sparkleOut 0.6s ease-out forwards;
        }

        @keyframes sparkleOut {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Floating hearts background -->
    <div class="bg-hearts" id="bgHearts"></div>

    <div class="container">
        <div class="ring-emoji">💍</div>
        <h1>באיזה תאריך הצעתי לך?</h1>
        <div class="hearts">💖💕💖</div>

        <div class="form-box">
            <form id="staticrypt-form" action="#" method="post">
                <input
                    id="staticrypt-password"
                    type="password"
                    name="password"
                    class="password-input"
                    placeholder="DD/MM/YYYY"
                    autocomplete="off"
                />

                <div class="error-msg" id="errorMsg">
                    😅 לא נכון... נסי שוב!
                </div>

                <button type="submit" class="decrypt-btn">
                    💝 גלי את ההפתעה
                </button>

                <label class="remember-me">
                    <input id="staticrypt-remember" type="checkbox" name="remember" />
                    זכרי אותי
                </label>
            </form>

            <div class="hint">רמז: התאריך שבו אמרת כן ✨</div>
        </div>
    </div>

    <script>
        // Floating hearts
        (function() {
            const container = document.getElementById('bgHearts');
            const hearts = ['💖', '💕', '💗', '✨', '💝', '🌸', '💍'];
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (8 + Math.random() * 12) + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
                container.appendChild(heart);
            }
        })();

        // Show error with shake on wrong password
        const form = document.getElementById('staticrypt-form');
        form.addEventListener('submit', function() {
            setTimeout(function() {
                // If still on the same page after a tick, password was wrong
                const errEl = document.getElementById('errorMsg');
                errEl.style.display = 'block';
                errEl.style.animation = 'none';
                errEl.offsetHeight;
                errEl.style.animation = 'shake 0.5s ease';
            }, 200);
        });
    </script>

    {crypto_tag}

</body>
</html>
