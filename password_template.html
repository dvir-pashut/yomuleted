<!DOCTYPE html>
<html lang="he" dir="rtl" class="staticrypt-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/*[|template_title|]*/0</title>

    <!-- do not cache this page -->
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Rubik+Bubbles&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
            margin: 0;
        }

        .hidden {
            display: none !important;
        }

        /* Loading spinner */
        .staticrypt-spinner-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 0.25em solid rgba(255,107,157,0.3);
            border-right-color: #ff6b9d;
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            100% { transform: rotate(360deg); }
        }

        /* Floating hearts background */
        .bg-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.15;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .ring-emoji {
            font-size: 4rem;
            animation: bounce 1s ease infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-family: 'Rubik Bubbles', cursive;
            font-size: 2.5rem;
            margin: 1rem 0;
            background: linear-gradient(90deg, #ff6b9d, #ffa69e, #ffd9da, #ffa69e, #ff6b9d);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .hearts {
            font-size: 1.5rem;
            margin: 0.8rem 0 1.5rem;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .form-box {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 0.5rem;
        }

        .password-input {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1.2rem;
            font-family: 'Heebo', sans-serif;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 107, 157, 0.3);
            border-radius: 14px;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            direction: ltr;
        }

        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .password-input:focus {
            border-color: #ff6b9d;
            background: rgba(255, 107, 157, 0.1);
            box-shadow: 0 0 25px rgba(255, 107, 157, 0.2);
        }

        .decrypt-btn {
            width: 100%;
            margin-top: 1.2rem;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
        }

        .decrypt-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
        }

        .decrypt-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .remember-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .remember-label input[type="checkbox"] {
            accent-color: #ff6b9d;
            width: 16px;
            height: 16px;
        }

        .hint {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: rgba(255, 166, 158, 0.6);
            font-weight: 300;
        }

        .error-msg {
            display: none;
            margin-top: 0.8rem;
            color: #e74c3c;
            font-size: 0.95rem;
            animation: shake 0.5s ease;
        }

        .error-msg.visible {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @media screen and (-webkit-min-device-pixel-ratio: 0) {
            .password-input {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div id="staticrypt_loading" class="staticrypt-spinner-container">
        <div class="staticrypt-spinner"></div>
    </div>

    <div id="staticrypt_content" class="hidden">
        <!-- Floating hearts background -->
        <div class="bg-hearts" id="bgHearts"></div>

        <div class="container">
            <div class="ring-emoji">💍</div>
            <h1> אתרולודת!</h1>
            <div class="hearts">💖💕💖</div>

            <div class="form-box">
                <form id="staticrypt-form" action="#" method="post">
                    <input
                        id="staticrypt-password"
                        type="password"
                        name="password"
                        class="password-input"
                        placeholder="DD/MM/YYYY"
                        autofocus
                    />

                    <div class="error-msg" id="errorMsg">
                        😅 לא נכון... נסי שוב!
                    </div>

                    <button type="submit" class="decrypt-btn">
                        💝 תנחשי את ההפתעה
                    </button>

                    <label id="staticrypt-remember-label" class="remember-label hidden">
                        <input id="staticrypt-remember" type="checkbox" name="remember" />
                        זכרי אותי
                    </label>
                </form>

                <div class="hint">רמז: התאריך שבו אמרת כן ✨</div>
            </div>
        </div>
    </div>

    <script>
        // staticrypt variables - filled at build time
        const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
        const templateError = "/*[|template_error|]*/0",
            isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
            staticryptConfig = /*[|staticrypt_config|]*/ 0;

        const templateConfig = {
            rememberExpirationKey: "staticrypt_expiration",
            rememberPassphraseKey: "staticrypt_passphrase",
            replaceHtmlCallback: null,
            clearLocalStorageCallback: null,
        };

        const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

        // try to automatically decrypt on load
        window.onload = async function () {
            const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

            if (!isSuccessful) {
                document.getElementById("staticrypt_loading").classList.add("hidden");
                document.getElementById("staticrypt_content").classList.remove("hidden");
                document.getElementById("staticrypt-password").focus();

                if (isRememberEnabled) {
                    document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                }
            }
        };

        // handle form submission
        document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const password = document.getElementById("staticrypt-password").value,
                isRememberChecked = document.getElementById("staticrypt-remember").checked;

            const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

            if (!isSuccessful) {
                const errEl = document.getElementById("errorMsg");
                errEl.classList.add("visible");
                errEl.style.animation = "none";
                errEl.offsetHeight;
                errEl.style.animation = "shake 0.5s ease";
            }
        });

        // Floating hearts
        (function() {
            const container = document.getElementById('bgHearts');
            const hearts = ['💖', '💕', '💗', '✨', '💝', '🌸', '💍'];
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (8 + Math.random() * 12) + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
                container.appendChild(heart);
            }
        })();
    </script>
</body>
</html>
