<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יום הולדת שמח! 🎂</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Rubik+Bubbles&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .cake-emoji {
            font-size: 5rem;
            animation: bounce 1s ease infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-family: 'Rubik Bubbles', cursive;
            font-size: 3.5rem;
            margin: 1rem 0;
            background: linear-gradient(90deg, #ff6b9d, #ffa69e, #ffd9da, #ffa69e, #ff6b9d);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .subtitle {
            font-size: 1.4rem;
            color: #ffa69e;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .hearts {
            font-size: 1.5rem;
            margin: 1rem 0;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .choose-btn {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
            color: white;
            padding: 1rem 2.5rem;
            font-size: 1.5rem;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            margin-top: 1rem;
        }

        .choose-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
        }

        .options-container {
            display: none;
            margin-top: 2rem;
        }

        .options-container.visible {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .option-btn {
            display: block;
            width: 100%;
            margin: 0.8rem 0;
            padding: 1.2rem 1.5rem;
            font-size: 1.2rem;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(.clicked):not(.final) {
            border-color: #ff6b9d;
            background: rgba(255, 107, 157, 0.15);
            transform: translateX(-5px);
        }

        .option-btn.clicked {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            cursor: default;
        }

        .option-btn.clicked .wrong-label {
            display: inline;
        }

        .wrong-label {
            display: none;
            color: #e74c3c;
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .option-number {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            border-radius: 50%;
            background: rgba(255, 107, 157, 0.3);
            margin-left: 0.7rem;
            font-size: 0.9rem;
        }

        .final-option {
            display: none;
            margin-top: 1.5rem;
        }

        .final-option.visible {
            display: block;
            animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .final-option .option-btn {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.3);
            font-size: 1.3rem;
        }

        .final-option .option-btn:hover {
            background: rgba(46, 204, 113, 0.3);
            transform: translateX(-5px);
        }

        .final-option .option-btn.final-clicked {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.3);
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.5);
        }

        .celebration {
            display: none;
            margin-top: 2rem;
        }

        .celebration.visible {
            display: block;
            animation: fadeIn 1s ease;
        }

        .celebration h2 {
            font-family: 'Rubik Bubbles', cursive;
            font-size: 2rem;
            color: #2ecc71;
            margin-bottom: 0.5rem;
        }

        .celebration p {
            font-size: 1.2rem;
            color: #ffa69e;
        }

        .celebration .big-heart {
            font-size: 4rem;
            display: inline-block;
            animation: pulse 1s ease infinite;
            margin-top: 1rem;
        }

        /* Floating background elements */
        .bg-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.15;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        .confetti-container.active {
            display: block;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(180deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Floating hearts background -->
    <div class="bg-hearts" id="bgHearts"></div>

    <!-- Confetti -->
    <div class="confetti-container" id="confetti"></div>

    <div class="container">
        <div class="cake-emoji">🎂</div>
        <h1> יום הולדת שמח נסי שלי!</h1>
        <div class="subtitle">מגיע לך את כל הטוב שבעולם ✨</div>
        <div class="hearts">💖💕💖</div>

        <button class="choose-btn" id="chooseBtn" onclick="showOptions()">
            🎁 עכשיו בחרי את המתנה שלך
        </button>

        <div class="options-container" id="optionsContainer">
            <p style="margin-bottom: 1rem; font-size: 1.1rem; color: #ccc;">מה את הכי רוצה?</p>

            <button class="option-btn" id="opt1" onclick="handleOption(1)">
                <span class="option-number">1</span>
                לבלות זמן איכות עם נסי + פול בודי מסאז + מלא יחס
                <span class="wrong-label">❌ תשובה לא נכונה!</span>
            </button>

            <button class="option-btn" id="opt2" onclick="handleOption(2)">
                <span class="option-number">2</span>
                יום צילומים זוגי
                <span class="wrong-label">❌ תשובה לא נכונה!</span>
            </button>

            <button class="option-btn" id="opt3" onclick="handleOption(3)">
                <span class="option-number">3</span>
                תכשיט חדש
                <span class="wrong-label">❌ תשובה לא נכונה!</span>
            </button>

            <div class="final-option" id="finalOption">
                <button class="option-btn final" id="opt4" onclick="handleFinal()">
                    <span class="option-number" style="background: rgba(46,204,113,0.4);">4</span>
                    💝 כל התשובות נכונות! 💝
                </button>
            </div>
        </div>

        <div class="celebration" id="celebration">
            <h2>🎉 את מקבלת הכל! 🎉</h2>
            <p>כי מגיע לך את כל העולם</p>
            <div class="big-heart">❤️</div>
            <p style="margin-top: 1rem; font-size: 1rem; color: #aaa;">יום הולדת שמח אהובה שלי 💕</p>
        </div>
    </div>

    <script>
        // Track clicked options
        const clickedOptions = new Set();

        function showOptions() {
            const btn = document.getElementById('chooseBtn');
            btn.style.display = 'none';
            const container = document.getElementById('optionsContainer');
            container.classList.add('visible');
        }

        function handleOption(num) {
            const btn = document.getElementById('opt' + num);
            if (btn.classList.contains('clicked')) return;

            btn.classList.add('clicked');
            clickedOptions.add(num);

            // Shake animation
            btn.style.animation = 'none';
            btn.offsetHeight; // trigger reflow
            btn.style.animation = 'shake 0.5s ease';

            // Check if all 3 are clicked
            if (clickedOptions.size === 3) {
                setTimeout(() => {
                    document.getElementById('finalOption').classList.add('visible');
                }, 800);
            }
        }

        function handleFinal() {
            const btn = document.getElementById('opt4');
            btn.classList.add('final-clicked');

            // Show celebration
            setTimeout(() => {
                document.getElementById('celebration').classList.add('visible');
                launchConfetti();
            }, 400);
        }

        // Floating hearts background
        function createFloatingHearts() {
            const container = document.getElementById('bgHearts');
            const hearts = ['💖', '💕', '💗', '✨', '💝', '🌸'];
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (8 + Math.random() * 12) + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
                container.appendChild(heart);
            }
        }

        // Confetti explosion
        function launchConfetti() {
            const container = document.getElementById('confetti');
            container.classList.add('active');
            const colors = ['#ff6b9d', '#ffa69e', '#ffd9da', '#2ecc71', '#f1c40f', '#e74c3c', '#9b59b6', '#3498db'];

            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.width = (5 + Math.random() * 10) + 'px';
                    piece.style.height = (5 + Math.random() * 10) + 'px';
                    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
                    container.appendChild(piece);

                    setTimeout(() => piece.remove(), 5000);
                }, i * 30);
            }
        }

        // Add shake keyframes dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-10px); }
                40% { transform: translateX(10px); }
                60% { transform: translateX(-5px); }
                80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        createFloatingHearts();
    </script>
</body>
</html>
